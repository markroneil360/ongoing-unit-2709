name: Deploy static site to GitHub Pages

# Publishes the static dashboard (index.html + relative assets) to GitHub Pages.
# No build step: the repo is served as-is. Runs on pushes to the default branch
# and after the daily data refresh, and can be triggered manually.

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Daily R6E8A data refresh (07:00 ET)"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
